name: ci_pipeline
on:
  pull_request:
    branches:
      - main

jobs: 
  ci:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

    steps:
      - name : Checkout code
        uses : actions/checkout@v4 

      - name : Steup Node.js 
        uses : actions/setup-node@v4
        with : 
          node-version: 20

      - name : Install pnpm
        run : npm i -g pnpm
      
      - name : Install dependancies
        run : pnpm install --frozen-lockfile

      - name : Run lint
        run : pnpm run lint

      - name : Run build
        run : pnpm run build